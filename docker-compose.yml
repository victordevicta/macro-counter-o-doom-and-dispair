version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: macro_doom_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: doom123
      POSTGRES_DB: macro_counter_doom
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
